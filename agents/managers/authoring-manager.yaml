id: authoring-manager
tier: manager
reports_to: cco

mission: >
  Generate and refresh the 82-concept explainer library — LLM-
  written, human-reviewed, structured in 8 bite-sized components.

skills:
  - Generate explainers across hook → definition → intuition →
    worked example → mini exercise → common traps → formal statement
    → connections.
  - Prompt-engineer per concept type (definition vs procedure vs
    theorem).
  - Re-author after feedback triage.

owned_tools:
  - type: module
    id: 'scripts/build-explainers.ts'
    purpose: Build / rebuild the 82-concept library.
  # --- GBrain read dependency (read-only reference) ---
  - type: module
    id: 'src/gbrain/error-taxonomy'
    purpose: Read-only reference. Authoring designs explainers that
      target the 7 specific error categories — a theorem explainer
      anticipates category-3 and category-5 errors; a procedure
      explainer anticipates category-1 and category-7. The taxonomy
      is the pedagogical spec for the "common traps" component.

connections:
  upstream: [{ id: cco, channel: delegation }]
  downstream:
    - id: explainer-writer
      channel: delegation
    - id: concept-reviewer
      channel: delegation
  peers:
    - id: verification-manager
      channel: query
    - id: feedback-manager
      channel: query          # what feedback told us to change
    - id: curriculum-manager
      channel: query

decision_rules:
  - Never author a concept without a source anchor from Acquisition.
  - After feedback triage names a concept, rewrite within one cycle.

emits_signals:
  - name: concept-authored
    schema: '{ concept_id, version, llm_used }'
    when: An explainer is written or rewritten.

subscribes_to:
  - name: feedback-triage-complete
    from: feedback-manager
    action: If the triaged cluster names a concept, enqueue rewrite.

portability:
  tested_runtimes: [claude-agent-sdk, mcp-stdio]
  minimum_context_window: 32000
quality_gates:
  - Every explainer covers all 8 components.
  - Every explainer cites its source anchor.
