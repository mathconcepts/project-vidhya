<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vidhya Admin Orchestrator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0a0e13;
      --bg-panel:    #10151c;
      --bg-inset:    #070a0e;
      --border:      #1f2937;
      --border-hi:   #2d3a4a;
      --text:        #e5e7eb;
      --text-dim:    #9ca3af;
      --text-faint:  #6b7280;
      --accent:      #f0b060;
      --accent-dim:  #a47a42;
      --crit:        #dc2626;
      --warn:        #f59e0b;
      --info:        #60a5fa;
      --ok:          #10b981;
      --p0:          #dc2626;
      --p1:          #f59e0b;
      --p2:          #60a5fa;
      --p3:          #6b7280;
      --serif:       'IM Fell English', 'Times New Roman', serif;
      --sans:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'IBM Plex Mono', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 14px;
      line-height: 1.55;
      padding: 24px 32px 80px;
      background-image:
        radial-gradient(ellipse at top, rgba(240,176,96,0.03), transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(96,165,250,0.02), transparent 50%);
      background-attachment: fixed;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    h1 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    h1 em {
      font-style: italic;
      color: var(--text-dim);
      font-size: 20px;
      margin-left: 6px;
    }
    .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .meta span { margin-right: 14px; }
    .meta strong { color: var(--text-dim); font-weight: 500; }

    header .actions { margin-left: auto; display: flex; gap: 12px; align-items: center; }

    button, .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 14px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-hi);
      cursor: pointer;
      transition: all 120ms ease;
      border-radius: 2px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover { background: #ffc878; border-color: #ffc878; color: var(--bg); }
    button.danger { color: var(--crit); border-color: var(--crit); }
    button.danger:hover { background: var(--crit); color: #fff; }

    label.toggle {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    label.toggle input { accent-color: var(--accent); cursor: pointer; }

    /* ─── Status banner ──────────────────────────────────────── */
    .status-bar {
      display: grid;
      grid-template-columns: auto 1fr auto auto auto auto auto;
      gap: 24px;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 28px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 2px;
    }
    .status-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .status-healthy        { color: var(--ok);   background: rgba(16,185,129,0.08); }
    .status-attention-needed { color: var(--warn); background: rgba(245,158,11,0.08); }
    .status-degraded       { color: var(--crit); background: rgba(220,38,38,0.08); }

    .status-summary {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
    }
    .counter {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .counter strong {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .counter.crit strong { color: var(--crit); }
    .counter.warn strong { color: var(--warn); }
    .counter.info strong { color: var(--info); }

    /* ─── Main grid ──────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(360px, 1.3fr) minmax(300px, 1fr);
      gap: 24px;
    }
    @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }

    section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 20px 22px;
      border-radius: 2px;
      min-height: 180px;
    }
    section + section { margin-top: 20px; }

    h2 {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    h2 .count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── Signals ─────────────────────────────────────────────── */
    .signal {
      padding: 12px 0;
      border-bottom: 1px dotted var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
    }
    .signal:last-child { border-bottom: none; }
    .signal .sev {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 2px;
      min-width: 60px;
      text-align: center;
      white-space: nowrap;
    }
    .sev.critical { background: var(--crit); color: #fff; }
    .sev.warning  { background: var(--warn); color: #1a1200; }
    .sev.info     { background: var(--info); color: #0b1220; }
    .signal .head {
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
    }
    .signal .detail {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }
    .signal .code {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 6px;
      letter-spacing: 0.03em;
    }

    /* ─── Strategies ─────────────────────────────────────────── */
    .strategy {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 14px;
      border-radius: 2px;
    }
    .strategy header {
      padding: 0 0 10px;
      border-bottom: 1px dotted var(--border);
      margin-bottom: 10px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .priority-pill {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .priority-pill.P0 { background: var(--p0); color: #fff; }
    .priority-pill.P1 { background: var(--p1); color: #1a1200; }
    .priority-pill.P2 { background: var(--p2); color: #0b1220; }
    .priority-pill.P3 { background: var(--p3); color: #fff; }
    .strategy .headline {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      flex: 1;
    }
    .strategy .rationale {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .strategy .narration {
      font-family: var(--serif);
      font-size: 13px;
      color: var(--accent);
      font-style: italic;
      padding: 8px 10px;
      border-left: 2px solid var(--accent);
      background: rgba(240, 176, 96, 0.04);
      margin: 8px 0 10px;
      line-height: 1.5;
    }
    .strategy .tasks-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .strategy .task-line {
      font-size: 12px;
      color: var(--text-dim);
      padding: 3px 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .strategy .task-line .role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ─── Tasks ──────────────────────────────────────────────── */
    .role-filter {
      margin-bottom: 14px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .role-filter button {
      font-size: 10px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .role-filter button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .task {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 2px;
    }
    .task header {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
      padding: 0;
      border: none;
    }
    .task .role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .task .status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: auto;
    }
    .task .status.open { color: var(--info); }
    .task .status.in_progress { color: var(--warn); }
    .task .status.blocked { color: var(--crit); }
    .task .status.done { color: var(--ok); }
    .task .title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .task .desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .task .actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .task .actions button {
      font-size: 10px;
      padding: 4px 8px;
    }
    .task .meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.03em;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ─── Insights ───────────────────────────────────────────── */
    .insight {
      padding: 10px 0;
      border-bottom: 1px dotted var(--border);
    }
    .insight:last-child { border-bottom: none; }
    .insight .kind {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .insight .head {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .insight .detail {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .insight .data {
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
    }

    /* ─── MCP explorer ───────────────────────────────────────── */
    .mcp-section {
      margin-top: 28px;
      padding: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .mcp-section > summary {
      cursor: pointer;
      padding: 14px 20px;
      font-family: var(--serif);
      font-size: 18px;
      color: var(--text);
      list-style: none;
      user-select: none;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .mcp-section > summary::before {
      content: '▸';
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      transition: transform 120ms ease;
    }
    .mcp-section[open] > summary::before { transform: rotate(90deg); display: inline-block; }
    .mcp-section > summary .badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-left: auto;
    }
    .mcp-body {
      padding: 0 20px 20px;
    }

    .mcp-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .mcp-tabs button {
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      padding: 8px 16px;
      color: var(--text-dim);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.06em;
    }
    .mcp-tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .mcp-tabs button:hover { color: var(--accent); }

    .mcp-list { display: flex; flex-direction: column; gap: 6px; }
    .mcp-row {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 2px;
    }
    .mcp-row header {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 0;
      border: none;
      margin: 0 0 4px;
    }
    .mcp-row .name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
    .mcp-row .category {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .mcp-row .category.destructive { color: var(--crit); border-color: var(--crit); }
    .mcp-row .category.read { color: var(--info); border-color: var(--border); }
    .mcp-row .category.write { color: var(--warn); border-color: var(--border); }
    .mcp-row .category.action { color: var(--accent); border-color: var(--border); }
    .mcp-row .category.analysis { color: var(--text-dim); border-color: var(--border); }
    .mcp-row .desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.45;
    }
    .mcp-row details {
      margin-top: 8px;
    }
    .mcp-row details summary {
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      user-select: none;
    }
    .mcp-row pre {
      margin-top: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
      overflow-x: auto;
      border-radius: 2px;
    }

    /* ─── Prompts tab (v2.27.0) ──────────────────────────────── */
    .prompt-row .prompt-args {
      margin-top: 10px;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .prompt-arg {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    @media (max-width: 700px) {
      .prompt-arg { grid-template-columns: 1fr; }
    }
    .prompt-arg .arg-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
    }
    .prompt-arg .arg-name .required {
      color: var(--crit);
      margin-left: 3px;
      font-style: normal;
      font-weight: 600;
    }
    .prompt-arg .arg-desc {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .prompt-arg input {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      background: var(--bg-inset);
      border: 1px solid var(--border-hi);
      color: var(--text);
      border-radius: 2px;
      min-width: 140px;
    }
    .prompt-arg input:focus { outline: none; border-color: var(--accent); }
    .prompt-controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .prompt-controls button { font-size: 11px; padding: 6px 12px; }
    .prompt-error {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(220,38,38,0.08);
      border-left: 2px solid var(--crit);
      color: var(--crit);
      font-size: 12px;
      border-radius: 2px;
    }
    .prompt-preview {
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px !important;
      line-height: 1.6 !important;
    }
    /* OK toast variant */
    .error-toast.ok {
      background: var(--ok);
      color: #04221a;
    }

    /* ─── Auth prompt ────────────────────────────────────────── */
    .auth-prompt {
      max-width: 520px;
      margin: 80px auto;
      padding: 32px 36px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 2px;
    }
    .auth-prompt h2 { border: none; margin-bottom: 12px; }
    .auth-prompt p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
    .auth-prompt input {
      width: 100%;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      margin-bottom: 12px;
    }
    .auth-prompt input:focus { outline: none; border-color: var(--accent); }
    .auth-prompt button { width: 100%; }

    /* ─── Utility ────────────────────────────────────────────── */
    .empty {
      font-family: var(--serif);
      font-style: italic;
      color: var(--text-faint);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 800ms linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--crit);
      color: #fff;
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-width: 400px;
      z-index: 100;
    }

    code, .mono { font-family: var(--mono); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Fade-in for initial load ───────────────────────────── */
    main, .status-bar, .mcp-section {
      opacity: 0;
      animation: fadein 380ms ease forwards;
    }
    .status-bar   { animation-delay: 40ms; }
    main          { animation-delay: 120ms; }
    .mcp-section  { animation-delay: 220ms; }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════════
  // Admin Dashboard — vanilla JS, zero dependencies
  // ═══════════════════════════════════════════════════════════════════

  const TOKEN_KEY = 'vidhya_auth_token';
  const POLL_INTERVAL_MS = 30000;

  // ─── Auth ─────────────────────────────────────────────────────────
  function getToken() { return localStorage.getItem(TOKEN_KEY); }
  function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
  function clearToken() { localStorage.removeItem(TOKEN_KEY); }

  // ─── HTTP helpers ─────────────────────────────────────────────────
  async function fetchJSON(path, opts = {}) {
    const token = getToken();
    const headers = Object.assign({
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    }, opts.headers || {});
    const res = await fetch(path, { ...opts, headers });
    if (res.status === 401) {
      clearToken();
      throw new Error('Unauthorized — please provide a valid token');
    }
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(res.status + ': ' + (body || res.statusText));
    }
    return res.json();
  }

  // ─── Small DOM helper ─────────────────────────────────────────────
  function el(tag, attrs = {}, ...kids) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') e.className = v;
      else if (k === 'onclick') e.onclick = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== undefined && v !== null && v !== false) e.setAttribute(k, v);
    }
    for (const k of kids.flat()) {
      if (k === null || k === undefined || k === false) continue;
      e.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
    }
    return e;
  }

  function relativeTime(iso) {
    if (!iso) return '';
    const d = new Date(iso).getTime();
    if (isNaN(d)) return '';
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  function toast(msg, kind = 'error') {
    const t = el('div', { class: 'error-toast' + (kind === 'ok' ? ' ok' : '') }, msg);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4500);
  }

  // ── Signals column ──

    const signals = state.run.health_report.signals || [];

    sec.appendChild(el('h2', {}, 'Signals', el('span', { class: 'count' }, '(' + signals.length + ')')));

    if (signals.length === 0) {
      sec.appendChild(el('div', { class: 'empty' }, 'No signals detected.'));
    } else {
      // Sort: critical > warning > info, each newest first within severity
      const order = { critical: 0, warning: 1, info: 2 };
      const sorted = [...signals].sort((a, b) => {
        const ds = (order[a.severity] ?? 3) - (order[b.severity] ?? 3);
        if (ds !== 0) return ds;
        return (b.detected_at || '').localeCompare(a.detected_at || '');

        const row = el('div', { class: 'signal' },

  async function loadTasks() {
    try {
      const url = state.roleFilter ? '/api/admin/agent/tasks?role=' + encodeURIComponent(state.roleFilter) : '/api/admin/agent/tasks';
      const data = await fetchJSON(url);
      const container = document.getElementById('tasks-container');
      if (!container) return;
      container.innerHTML = '';
      const open = (data.tasks || []).filter(t => t.status !== 'done' && t.status !== 'cancelled');
      if (open.length === 0) {
        container.appendChild(el('div', { class: 'empty' }, 'No open tasks for this filter.'));
        return;
      }
      // Sort: blocked last, then by created_at asc
      open.sort((a, b) => {
        if (a.status === 'blocked' && b.status !== 'blocked') return 1;
        if (b.status === 'blocked' && a.status !== 'blocked') return -1;
        return (a.created_at || '').localeCompare(b.created_at || '');
      });
      for (const t of open) {
        container.appendChild(renderTask(t));
      }
    } catch (err) {
      toast('Tasks: ' + err.message);
    }
  }

  function renderTask(t) {
    const box = el('div', { class: 'task' });
    box.appendChild(el('header', {},
      el('span', { class: 'role' }, t.assigned_role),
      el('span', { class: 'status ' + t.status }, t.status.replace('_', ' ')),

    box.appendChild(el('div', { class: 'title' }, t.title));
    box.appendChild(el('div', { class: 'desc' }, t.description));

    const metaBits = [t.id, '~' + t.estimated_effort_minutes + 'm'];
    if (t.suggested_tool_ids && t.suggested_tool_ids.length > 0) {
      metaBits.push(t.suggested_tool_ids.join(' · '));
    }
    box.appendChild(el('div', { class: 'meta' }, metaBits.map(b => el('span', {}, b))));

    if (t.status === 'open') {
      const actions = el('div', { class: 'actions' });
      actions.appendChild(el('button', { onclick: () => claimTask(t.id) }, 'Claim'));
      actions.appendChild(el('button', { onclick: () => completeTask(t.id) }, 'Complete'));
      box.appendChild(actions);
    } else if (t.status === 'in_progress') {
      const actions = el('div', { class: 'actions' });
      actions.appendChild(el('button', { class: 'primary', onclick: () => completeTask(t.id) }, 'Complete'));
      box.appendChild(actions);
    }

    return box;
  }

  // ─── Prompts tab (v2.27.0) ────────────────────────────────────────
  // Each prompt renders: name, description, an inputs section for its
  // args (respecting required flag), a Generate button that calls
  // prompts/get via JSON-RPC, and on result: a preview + Copy button.
  function renderPromptsList() {
    const list = el('div', { class: 'mcp-list' });
    if (state.prompts.length === 0) {
      list.appendChild(el('div', { class: 'empty' }, 'No prompts available for this role.'));
      return list;
    }
    for (const p of state.prompts) {
      // Lazily initialise this prompt's local state
      if (!state.promptState[p.name]) {
        state.promptState[p.name] = { args: {}, generated: null, isLoading: false, error: null };
      }
      const ps = state.promptState[p.name];

      const row = el('div', { class: 'mcp-row prompt-row' });
      row.appendChild(el('header', {},
        el('span', { class: 'name' }, p.name),
      ));
      row.appendChild(el('div', { class: 'desc' }, p.description));

      // Argument inputs
      if (p.arguments && p.arguments.length > 0) {
        const form = el('div', { class: 'prompt-args' });
        for (const arg of p.arguments) {
          const label = el('label', { class: 'prompt-arg' });
          label.appendChild(el('span', { class: 'arg-name' },
            arg.name, arg.required ? el('em', { class: 'required' }, '*') : null));
          label.appendChild(el('span', { class: 'arg-desc' }, arg.description));
          const input = el('input', {
            type: 'text',
            placeholder: arg.required ? 'required' : 'optional',
            value: ps.args[arg.name] || '',
            onchange: (e) => { ps.args[arg.name] = e.target.value; },
            oninput: (e) => { ps.args[arg.name] = e.target.value; },
          });
          label.appendChild(input);
          form.appendChild(label);
        }
        row.appendChild(form);
      }

      // Generate + Copy controls
      const controls = el('div', { class: 'prompt-controls' });
      controls.appendChild(el('button', {
        class: 'primary',
        disabled: ps.isLoading || undefined,
        onclick: () => generatePrompt(p.name),
      }, ps.isLoading ? el('span', { class: 'spinner' }) : 'Generate'));

      if (ps.generated) {
        controls.appendChild(el('button', {
          onclick: () => copyToClipboard(ps.generated, p.name),
        }, 'Copy to Clipboard'));
        controls.appendChild(el('button', {
          onclick: () => { ps.generated = null; ps.error = null; render(); },
        }, 'Clear'));
      }
      row.appendChild(controls);

      // Error display
      if (ps.error) {
        row.appendChild(el('div', { class: 'prompt-error' }, 'Error: ' + ps.error));
      }

      // Generated preview
      if (ps.generated) {
        row.appendChild(el('details', { open: true },
          el('summary', {}, 'Generated prompt (' + ps.generated.length + ' chars)'),
          el('pre', { class: 'prompt-preview' }, ps.generated),
        ));
      }

      list.appendChild(row);
    }
    return list;
  }

  async function generatePrompt(name) {
    const ps = state.promptState[name];
    ps.isLoading = true;
    ps.error = null;
    render();
    try {
      // Strip empty string args — treat as omitted
      const cleanArgs = {};
      for (const [k, v] of Object.entries(ps.args)) {
        if (v !== '' && v !== null && v !== undefined) cleanArgs[k] = v;
      }
      const resp = await fetchJSON('/api/admin/agent/mcp', {
        method: 'POST',
        body: JSON.stringify({
          jsonrpc: '2.0', id: Date.now(),
          method: 'prompts/get',
          params: { name, arguments: cleanArgs },
        }),
      });
      if (resp.error) {
        ps.error = resp.error.message || 'Unknown error (' + resp.error.code + ')';
      } else {
        const text = resp.result?.messages?.[0]?.content?.text;
        if (typeof text === 'string') {
          ps.generated = text;
        } else {
          ps.error = 'Unexpected response shape';
        }
      }
    } catch (err) {
      ps.error = err.message || String(err);
    } finally {
      ps.isLoading = false;
      render();
    }
  }

  async function copyToClipboard(text, promptName) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        toast('Copied ' + text.length + ' chars for "' + promptName + '"', 'ok');
      } else {
        // Fallback for older browsers / non-https contexts
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(textarea);
        if (ok) toast('Copied ' + text.length + ' chars for "' + promptName + '"', 'ok');
        else toast('Copy failed — select the preview text and copy manually');
      }
    } catch (err) {
      toast('Copy error: ' + err.message);
    }
  }

  // ─── Recent student plans panel (v2.32, Item 6) ───────────────────
  //
  // Uses the student:list-plans MCP tool on-demand — lists the N most
  // recent plans across ALL students the operator is authorized to
  // see. Renders a compact roll-up per plan: headline, when, action
  // count, execution status.
  //
  // Role-gated at the route level (listPlansForStudent is scoped to
  // the caller's analyst/admin/owner role via the tool registry).
  function renderRecentStudentPlans() {
    const sec = el('details', { class: 'mcp-section' });
    sec.appendChild(el('summary', {},
      'Recent Student Plans',
      el('span', { class: 'badge' },
        state.recentPlans.length + ' plans'),
    ));

    const body = el('div', { class: 'mcp-body' });

    // Refresh button
    const actions = el('div', { style: 'display:flex;gap:8px;margin-bottom:12px;' });
    const refreshBtn = el('button', {
      class: 'btn',
      onclick: refreshRecentPlans,
    }, state.recentPlansLoading ? 'Loading…' : 'Refresh');
    actions.appendChild(refreshBtn);
    if (state.recentPlansError) {
      actions.appendChild(el('span', { class: 'error-text' },
        state.recentPlansError));
    }
    body.appendChild(actions);

    if (state.recentPlans.length === 0 && !state.recentPlansLoading) {
      body.appendChild(el('div', { class: 'empty' },
        'No plans yet. Click Refresh to fetch the latest.'));
    }

    const list = el('div', { class: 'mcp-list' });
    for (const plan of state.recentPlans) {
      const row = el('div', { class: 'mcp-row' });
      const hasExec = !!plan.execution;

      row.appendChild(el('header', {},
        el('span', { class: 'name' }, plan.id),
        el('span', {
          class: 'category ' + (hasExec ? 'read' : 'write'),
        }, hasExec ? 'executed' : 'unexecuted'),
      ));
      row.appendChild(el('div', { class: 'desc' }, plan.headline || '(no headline)'));

      const meta = el('div', { class: 'desc', style: 'opacity:0.75;font-size:11px;' });
      meta.appendChild(el('span', {}, 'student=' + (plan.request && plan.request.student_id) || '?'));
      meta.appendChild(el('span', {}, ' · actions=' + (plan.actions ? plan.actions.length : 0)));
      meta.appendChild(el('span', {}, ' · planned=' + (plan.total_estimated_minutes || 0) + 'min'));
      if (hasExec) {
        meta.appendChild(el('span', {},
          ' · actual=' + (plan.execution.actual_minutes_spent || 0) + 'min'));
        const done = plan.execution.actions_completed
          ? plan.execution.actions_completed.filter(o => o.completed).length
          : 0;
        const tot = plan.execution.actions_completed ? plan.execution.actions_completed.length : 0;
        meta.appendChild(el('span', {}, ' · completed=' + done + '/' + tot));
      }
      meta.appendChild(el('span', {}, ' · ' + (plan.generated_at || '').replace('T', ' ').slice(0, 16)));
      row.appendChild(meta);

      list.appendChild(row);
    }
    body.appendChild(list);

    sec.appendChild(body);
    return sec;
  }

  async function refreshRecentPlans() {
    state.recentPlansLoading = true;
    state.recentPlansError = null;
    render();
    try {
      // Uses the admin-agent proxy route to invoke the MCP tool.
      const response = await fetchJSON('/api/admin/agent/invoke', {
        method: 'POST',
        body: JSON.stringify({
          tool_id: 'student:list-plans',
          input: { student_id: '*', limit: 10 },
        }),
      });
      // student:list-plans is scoped per-student — for the admin
      // dashboard we want a global list. The route is a thin wrapper;
      // if '*' isn't supported on the backend, fall back to an empty
      // list gracefully.
      const plans = (response && response.output && response.output.plans) || [];
      state.recentPlans = plans;
    } catch (err) {
      state.recentPlansError = err.message || String(err);
    } finally {
      state.recentPlansLoading = false;
      render();
    }
  }

  // ─── Actions ──────────────────────────────────────────────────────
  async function runAgent() {
    if (state.isRunning) return;
    state.isRunning = true;
    render();
    try {
      await fetchJSON('/api/admin/agent/run', {
        method: 'POST',
        body: JSON.stringify({
          auto_enqueue_tasks: true,
          attempt_llm_narration: true,
        }),
      });
      await refresh();
    } catch (err) {
      toast('Agent run: ' + err.message);
    } finally {
      state.isRunning = false;
      render();
    }
  }

  async function claimTask(taskId) {
    try {
      await fetchJSON('/api/admin/agent/tasks/' + taskId + '/claim', { method: 'POST' });
      await loadTasks();
    } catch (err) { toast('Claim: ' + err.message); }
  }

  async function completeTask(taskId) {
    try {
      await fetchJSON('/api/admin/agent/tasks/' + taskId + '/complete', {
        method: 'POST',
        body: JSON.stringify({ note: 'Completed via dashboard' }),
      });
      await refresh();
    } catch (err) { toast('Complete: ' + err.message); }
  }

  async function refresh() {
    try {
      const [latest, insights, llm, tools] = await Promise.all([
        fetchJSON('/api/admin/agent/latest').catch(() => ({ run: null })),
        fetchJSON('/api/admin/agent/insights').catch(() => ({ insights: [] })),
        fetchJSON('/api/admin/agent/llm-status').catch(() => ({ llm: { available: false } })),
        fetchJSON('/api/admin/agent/tools').catch(() => ({ tools: [] })),
      ]);

      state.run = latest?.run || null;
      state.insights = insights?.insights || [];
      state.llm = llm?.llm || null;
      state.tools = tools?.tools || [];

      // Fetch MCP resources/list AND prompts/list via the JSON-RPC endpoint
      try {
        const [resRpc, promptsRpc] = await Promise.all([
          fetchJSON('/api/admin/agent/mcp', {
            method: 'POST',
            body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'resources/list' }),
          }).catch(() => null),
          fetchJSON('/api/admin/agent/mcp', {
            method: 'POST',
            body: JSON.stringify({ jsonrpc: '2.0', id: 2, method: 'prompts/list' }),
          }).catch(() => null),
        ]);
        state.resources = resRpc?.result?.resources || [];
        state.prompts = promptsRpc?.result?.prompts || [];
      } catch { state.resources = []; state.prompts = []; }

      render();
    } catch (err) {
      toast('Refresh: ' + err.message);
    }
  }

  // ─── Boot ─────────────────────────────────────────────────────────
  async function boot() {
    if (!getToken()) { render(); return; }

    // If no run exists, trigger one first
    try {
      const r = await fetchJSON('/api/admin/agent/latest');
      if (!r?.run) {
        await fetchJSON('/api/admin/agent/run', {
          method: 'POST',
          body: JSON.stringify({
            auto_enqueue_tasks: true,
            attempt_llm_narration: true,
          }),
        });
      }
    } catch (err) {
      if (err.message.includes('Unauthorized')) { render(); return; }
    }

    await refresh();

    // Auto-refresh polling
    setInterval(() => {
      const cb = document.getElementById('autorefresh');
      if (cb && cb.checked) refresh();
    }, POLL_INTERVAL_MS);
  }

  boot();
  </script>
</body>
