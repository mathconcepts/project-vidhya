topic_family: complex-numbers

intuition:
  scaffold: rotation-in-plane
  guidance: |
    Lead with i as a 90° rotation operator. Argand plane = R^2 with
    multiplication = rotation+scale. Avoid algebraic manipulation first.
  bloom_floor: 2

formal_definition:
  scaffold: cartesian-and-polar
  guidance: |
    Define z = a + bi AND z = r e^{iθ} side by side. Conversion formulas
    in display math.
  bloom_floor: 3

worked_example:
  scaffold: step-unfold
  guidance: |
    Convert form → operate (add/multiply/conjugate) → convert back.
    Six steps max.
  bloom_floor: 3

common_traps:
  scaffold: wrong-then-right
  guidance: |
    Common: forgetting i^2 = -1 mid-computation, wrong arg quadrant,
    confusing modulus with magnitude squared.
  bloom_floor: 4

micro_exercise:
  scaffold: one-shot-check
  bloom_floor: 3

retrieval_prompt:
  scaffold: flashcard
  bloom_floor: 2

visual_analogy:
  scaffold: argand-plane
  guidance: |
    Embed an interactive showing complex multiplication as rotation.

    When the concept reduces to a 2D parametric plot (z(t) on the Argand
    plane, modulus growth, phase rotation), ALSO emit a fenced gif-scene
    block at the end of the body. Schema:

    ```gif-scene
    {"type":"parametric","expression":"cos(t)","x_range":[-1.5,1.5],"y_range":[-1.5,1.5],"t_range":[0,6.28],"frames":30,"fps":12}
    ```

    Allowed tokens: x, t, +, -, *, /, ^, parens, numbers, sin/cos/tan/log/
    ln/exp/sqrt/abs/pi/e. OMIT the block when the concept is symbolic-only
    (algebraic identities, polynomial roots without trajectory). Never
    invent a misleading scene.
  bloom_floor: 2

exam_pattern:
  scaffold: gate-style-stem
  exam_pattern_required: true
  bloom_floor: 3

mnemonic:
  scaffold: short-rhyme
  bloom_floor: 2

interleaved_drill:
  scaffold: mixed-rule-set
  bloom_floor: 4

hook:
  scaffold: rotation-question
  bloom_floor: 1
