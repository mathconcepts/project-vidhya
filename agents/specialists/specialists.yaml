# Specialists layer — consolidated manifest.
#
# Each specialist is a narrow operator reporting to a single manager.
# Specialists are defined in one file (rather than one-file-per-agent)
# because their manifests are short and their boundaries are tight.
# An orchestrator loading this file treats each entry as a distinct
# agent.
#
# Adding a new specialist: add an entry to this file, reference it from
# the parent manager's downstream list, and confirm its owned_tools in
# src/admin-orchestrator/tool-registry.ts or elsewhere.

specialists:

  # ═══ Under planner-manager (CPO side) ══════════════════════════════

  - id: session-executor
    reports_to: planner-manager
    mission: Walk the student through an active plan, surfacing one action
      at a time, capturing outcomes.
    skills:
      - Render the next action and its content hint for the channel in use
      - Capture attempt outcomes as structured data
      - Advance or pause the plan based on student signals
    owned_tools:
      - type: module
        id: 'src/session-planner#planSession'
        purpose: Access plan structure
      - type: http
        id: 'POST /api/student/session/plans/:id/complete'
        purpose: Submit completed plan
    connections:
      peers:
        - id: template-curator
          channel: query

  - id: template-curator
    reports_to: planner-manager
    mission: Maintain the student's saved templates and surface the right
      preset at the right time.
    skills:
      - Detect when the student's pattern could be saved as a template
      - Surface unadopted presets when appropriate
      - Retire templates that have gone unused for 90+ days
    owned_tools:
      - type: http
        id: 'GET /api/student/session/templates'
      - type: http
        id: 'POST /api/student/session/templates'
      - type: http
        id: 'POST /api/student/session/templates/:id/use'
      - type: http
        id: 'GET /api/student/session/templates/presets'

  # ═══ Under teaching-manager ════════════════════════════════════════

  - id: explainer-specialist
    reports_to: teaching-manager
    mission: Produce the 8-component explainer for a single concept on
      demand — hook, definition, intuition, worked example, mini exercise,
      common traps, formal statement, connections.
    skills:
      - Write each component in the voice appropriate to the concept type
      - Ground every component in the source material
      - Sequence the 8 components for cognitive build-up
    owned_tools:
      - type: module
        id: 'src/lessons#renderLesson'
        purpose: Lesson rendering primitives

  - id: walkthrough-specialist
    reports_to: teaching-manager
    mission: Walk a student through a specific problem end-to-end —
      method, intuition, trap flagging, answer verification.
    skills:
      - Sequence the walkthrough as the student would work through it
      - Flag common traps before the student hits them
      - Route math through Wolfram verification before stating the answer
    owned_tools:
      - type: module
        id: 'src/content/resolver#resolve'
        purpose: Four-tier cascade

  - id: content-resolver
    reports_to: teaching-manager
    mission: Execute the four-tier cascade — bundle, RAG, LLM, Wolfram —
      for every content request and return the tier hit.
    skills:
      - Walk the cascade in order
      - Track per-tier hit rate
      - Escalate when no tier yields a confident answer
    owned_tools:
      - type: module
        id: 'src/content/resolver'
        purpose: The cascade

  # ═══ Under assessment-manager ═════════════════════════════════════

  - id: attempt-logger
    reports_to: assessment-manager
    mission: Capture every student attempt with timing, outcome, and
      context into the practice log and attention store.
    skills:
      - Normalise attempts to the canonical shape
      - Detect idempotency violations
      - Route into attention + practice log atomically
    owned_tools:
      - type: http
        id: 'POST /api/student/session/practice-log'

  - id: mock-exam-builder
    reports_to: assessment-manager
    mission: Assemble a micro-mock sized for the caller's time budget
      with a proper pacing arc.
    skills:
      - Choose questions spanning the exam's expected difficulty curve
      - Include the pacing warm-up and wind-down
      - Report the expected score under the student's model
    owned_tools: []

  # ═══ Under acquisition-manager ════════════════════════════════════

  - id: scraper-operator
    reports_to: acquisition-manager
    mission: Run each scraper script, detect format drift, report counts
      and anomalies.
    skills:
      - Execute scrape-corpus, scrape-textbooks without tripping rate limits
      - Detect output-schema drift from upstream sources
      - Emit a per-run report with counts and licence attribution
    owned_tools:
      - type: module
        id: 'scripts/scrape-corpus.ts'
      - type: module
        id: 'scripts/scrape-textbooks.ts'

  - id: licence-checker
    reports_to: acquisition-manager
    mission: Verify every incoming record carries a valid licence tag
      and refuse any that do not.
    skills:
      - Parse licence terms per source
      - Reject records missing licence metadata
      - Maintain the licence-by-source ledger
    owned_tools: []

  # ═══ Under verification-manager ═══════════════════════════════════

  - id: wolfram-verifier
    reports_to: verification-manager
    mission: Send each math record through Wolfram Alpha and attach the
      query id + result.
    skills:
      - Convert record notation to Wolfram syntax
      - Handle algebraically-equivalent restructured answers
      - Emit verification-complete on each batch
    owned_tools:
      - type: module
        id: 'scripts/verify-wolfram-batch.ts'

  - id: sample-reviewer
    reports_to: verification-manager
    mission: Sample-check non-verifiable content through structured
      rubric reviews.
    skills:
      - Apply the review rubric consistently
      - Surface samples that need human review
      - Close resolved samples with audit trail
    owned_tools:
      - type: mcp
        id: 'sample-check:list-open'
      - type: mcp
        id: 'sample-check:close-resolved'

  # ═══ Under authoring-manager ══════════════════════════════════════

  - id: explainer-writer
    reports_to: authoring-manager
    mission: Generate a draft 8-component explainer from a seed concept +
      source anchor.
    skills:
      - Expand a concept skeleton into the 8 components
      - Prompt-engineer per concept type (definition / procedure / theorem)
      - Never invent source material — always cite
    owned_tools:
      - type: module
        id: 'scripts/build-explainers.ts'

  - id: concept-reviewer
    reports_to: authoring-manager
    mission: Review a draft explainer for completeness, source fidelity,
      and pedagogical flow.
    skills:
      - Check all 8 components present
      - Verify every component cites a source
      - Flag discontinuities in the pedagogical sequence
    owned_tools: []

  # ═══ Under llm-router-manager ═════════════════════════════════════

  - id: provider-adapter-gemini
    reports_to: llm-router-manager
    mission: Execute Gemini-provider calls with the right config.
    owned_tools:
      - type: module
        id: 'src/llm/adapters/gemini'

  - id: provider-adapter-anthropic
    reports_to: llm-router-manager
    mission: Execute Anthropic-provider calls.
    owned_tools:
      - type: module
        id: 'src/llm/adapters/anthropic'

  - id: provider-adapter-openai
    reports_to: llm-router-manager
    mission: Execute OpenAI-provider calls.
    owned_tools:
      - type: module
        id: 'src/llm/adapters/openai'

  - id: cost-accountant
    reports_to: llm-router-manager
    mission: Track cost per LLM call across providers and surface alerts
      when cost drifts from baseline.
    skills:
      - Attribute each call's token counts to the routing decision
      - Roll up into daily/weekly cost summaries
      - Emit llm-cost-alert when thresholds breach
    owned_tools: []

  # ═══ Under infrastructure-manager ═════════════════════════════════

  - id: bundle-builder
    reports_to: infrastructure-manager
    mission: Assemble content-bundle.json from verified records plus
      explainer output; ship via GitHub Actions.
    skills:
      - SHA-256 dedup across records
      - Size budget enforcement (≤ 50 MB)
      - Version tagging
    owned_tools:
      - type: module
        id: 'scripts/build-bundle.ts'

  - id: cascade-tuner
    reports_to: infrastructure-manager
    mission: Tune the four-tier cascade when hit rates drift from target.
    skills:
      - Read tier hit-rate telemetry
      - Adjust tier-0 inclusion rules
      - Propose new tier-1 RAG index candidates
    owned_tools:
      - type: module
        id: 'src/content/resolver'

  # ═══ Under student-model-manager ═══════════════════════════════════

  - id: mastery-estimator
    reports_to: student-model-manager
    mission: Compute per-concept mastery from the attempt stream.
    skills:
      - Apply the Bayesian update rule per attempt
      - Detect threshold crossings
      - Expose read-only mastery queries
    owned_tools:
      - type: module
        id: 'src/gbrain/student-model'
        purpose: The MasteryEntry store and query surface.

  - id: error-classifier
    reports_to: student-model-manager
    mission: Classify each incorrect attempt into one of the 7 error
      categories.
    skills:
      - Apply the error taxonomy consistently
      - Flag attempts where classification is ambiguous
      - Maintain per-student error distribution
    owned_tools:
      - type: module
        id: 'src/gbrain/error-taxonomy'
        purpose: The ErrorType classification + rules.
      - type: module
        id: 'src/gbrain/after-each-attempt'
        purpose: Hand classified attempts to the write hook.

  # ═══ Under teaching-manager — GBrain consumers ═════════════════════

  - id: problem-generator-specialist
    reports_to: teaching-manager
    mission: Generate a calibrated problem for the current student
      using their live GBrain model state.
    skills:
      - Read mastery + attribute vector from the student model
      - Invoke the problem generator with model-aware difficulty
      - Tag the generated problem with target error categories
        so the student's response can be classified cleanly
    owned_tools:
      - type: module
        id: 'src/gbrain/problem-generator'
        purpose: GeneratedProblem — calibrated to current mastery.
      - type: module
        id: 'src/gbrain/student-model'
        purpose: Read mastery vector for calibration.

  # ═══ Under assessment-manager — GBrain write specialist ════════════

  - id: attempt-insight-specialist
    reports_to: assessment-manager
    mission: Convert every logged attempt into a GBrain AttemptInsight
      and route through the canonical after-each-attempt hook. This
      specialist is the sole legitimate invoker of the GBrain write
      path at the assessment layer.
    skills:
      - Convert raw attempt data to AttemptInsight shape
      - Invoke after-each-attempt deterministically
      - Emit the attempt-recorded signal with model-delta attribution
    owned_tools:
      - type: module
        id: 'src/gbrain/after-each-attempt'
        purpose: The canonical write path. No shadow writes.
      - type: module
        id: 'src/gbrain/error-taxonomy'
        purpose: Classify before writing.

  # ═══ Under telemetry-manager ══════════════════════════════════════

  - id: aggregation-specialist
    reports_to: telemetry-manager
    mission: Aggregate opt-in anonymous deltas into cohort buckets;
      enforce k-anonymity minimums.
    skills:
      - Bucket by (exam × concept × difficulty)
      - Drop sub-30-member buckets
      - Emit cohort signals on threshold breaches
    owned_tools:
      - type: module
        id: 'src/content/telemetry'

  # ═══ Under outreach-manager (CMO side) — customer-lifecycle ════════

  - id: conversion-specialist
    reports_to: outreach-manager
    mission: Own the demo-to-paid conversion handoff. Ensure demo
      testers who decide to become real users carry their work with them
      while the demo-usage log is anonymised at the moment of conversion.
    skills:
      - Execute migrateDemoToReal(from_user_id, to_user_id) across the
        five per-student flat-file stores (exam-profiles, session-plans,
        plan-templates, practice-sessions, users).
      - Null out user_id fields in demo-usage-log entries tied to the
        converting demo user — preserve event codes for cohort aggregate.
      - Record the converted_to link on the demo user record.
    owned_tools:
      - type: module
        id: 'src/conversion/migrate-demo-to-real.ts'
        purpose: Run the conversion migration.
      - type: http
        id: 'POST /api/demo/convert'
        purpose: Trigger conversion via the running backend.
    decision_rules:
      - Never migrate attention-store entries — those are ephemeral by
        design (fatigue signal, not identity).
      - Never draw more than one cross-account link. users.json's
        demo_user.converted_to field is the only such link permitted.
      - If migration fails midway, roll back writes to avoid partial state.
    connections:
      peers:
        - id: aggregation-specialist
          channel: query

  # ═══ Under planner-manager (CPO side) — customer-lifecycle ═════════

  - id: onboarding-specialist
    reports_to: planner-manager
    mission: Own the activation funnel — the path from fresh account
      to first compounding moment (trailing-stats badge > 0 minutes).
      Measure it end-to-end; surface drop-offs to product.
    skills:
      - Compute activation funnel conversion for fresh accounts
        (steps sign-up → exam registered → first plan → first attempt
        → trailing stats positive).
      - Tag users at each step so drop-offs between steps are visible.
      - Emit activation-milestone signals.
    owned_tools:
      - type: module
        id: 'src/onboarding/funnel.ts'
        purpose: Query the activation funnel metrics.
    decision_rules:
      - No per-user nudging or email — activation funnel is a COHORT
        metric, not a push-notification trigger. Calm promise applies.
      - Empty-state copy improvements flow back through feedback-manager,
        not directly to UI.
    emits_signals:
      - name: activation-milestone
        schema: '{ step, user_count, week }'
        when: Weekly cohort snapshot.

  # ═══ Under telemetry-manager (CDO side) — customer-lifecycle ═══════

  - id: retention-specialist
    reports_to: telemetry-manager
    mission: Detect disengagement patterns at the COHORT level without
      violating the Calm promise. Surface systemic issues (week-2 drop,
      topic-triggered churn) to the people who can fix them — not nudges
      to the individual student.
    skills:
      - Run cohort queries over anonymised telemetry
        (trailing-minutes by cohort, retention curves by entry vector).
      - Detect statistically significant drop patterns.
      - Route findings to feedback-manager or curriculum-manager.
    owned_tools:
      - type: module
        id: 'src/retention/cohort-queries.ts'
        purpose: Run retention queries against aggregated telemetry.
    decision_rules:
      - Cohort buckets under 30 members do not emit findings — preserves
        k-anonymity (inherited from telemetry-manager's rule).
      - Findings route to a HUMAN-readable dashboard, never to an
        outbound-email queue addressed at users.
      - The constitution bans streak-based gamification and guilt pings.
        This agent MUST NOT produce anything that violates that clause;
        violations are caught at review, not at runtime.
    connections:
      peers:
        - id: aggregation-specialist
          channel: query

  # ═══ Under security-manager (CTO side) — customer-lifecycle ════════

  - id: data-rights-specialist
    reports_to: security-manager
    mission: Execute self-service data rights — account deletion with
      cooling period, data export, and channel unlinking on offboard.
    skills:
      - Initiate soft-delete with 24h reversible window.
      - Finalise hard-delete after cooling period — drop all per-user
        flat-file entries, null user_id fields in demo telemetry,
        unlink any channel bindings.
      - Produce a portable JSON export of a user's data on request.
    owned_tools:
      - type: module
        id: 'src/data-rights/delete.ts'
        purpose: Delete or export a user's data.
      - type: http
        id: 'POST /api/me/delete'
        purpose: Student-initiated account deletion request.
      - type: http
        id: 'POST /api/me/delete/confirm'
        purpose: Confirm deletion after cooling period.
      - type: http
        id: 'GET /api/me/export'
        purpose: Portable JSON export of the user's data.
    decision_rules:
      - Soft-delete is reversible within 24h via a cancellation route.
      - Hard-delete is destructive and final. No data survives except
        k-anonymised aggregates telemetry-manager has already emitted.
      - Channel bindings are always unlinked on hard-delete — a user
        shouldn't keep reaching a bot they no longer have an account with.

  # ═══ Under teaching-manager (CPO side) — content-routing ═══════════

  - id: content-router
    reports_to: teaching-manager
    mission: Classify student content intent and route to the best
      available source (shipped bundle, cached, user uploads, community
      contributions, generated, or Wolfram live) — always disclosing
      the source to the student in the response.
    skills:
      - Parse natural-language requests into { intent, concept_id, modifiers }.
      - Walk the source priority list respecting user subscriptions,
        bundle availability, and verified status.
      - Bypass the tier cascade for Wolfram-live intents.
      - Emit CONTENT_ROUTED signals capturing the decision.
    owned_tools:
      - type: module
        id: 'src/content/router.ts'
        purpose: Intent classification + source selection.
      - type: http
        id: 'POST /api/student/content/request'
        purpose: Intent-based content request HTTP surface.
    decision_rules:
      - Every returned content carries source disclosure. A student
        never sees unattributed content.
      - Unverified content cannot be routed to production surfaces
        unless the student opts into preview mode explicitly.
      - Fails closed — ambiguous intent routes to the most conservative
        source (stored explainer over generation).
    emits_signals:
      - name: content-routed
        schema: '{ user_id_hash, concept_id, chosen_source, rejected_because }'
        when: Every routing decision.
    connections:
      peers:
        - id: content-resolver
          channel: query
        - id: upload-specialist
          channel: query
        - id: community-content-specialist
          channel: query
        - id: wolfram-verifier
          channel: query

  # ═══ Under acquisition-manager (CCO side) — user uploads ══════════

  - id: upload-specialist
    reports_to: acquisition-manager
    mission: Ingest and index user-uploaded material (photos, PDFs,
      handwritten notes) privately. Never mix with cohort data.
    skills:
      - Store uploads under .data/user-uploads/{user_id}/.
      - Extract text (OCR images, PDF-text PDFs) where possible.
      - Maintain a per-user index mapping concept_id to relevant uploads.
      - Chain into data-rights-specialist's hard-delete path.
    owned_tools:
      - type: module
        id: 'src/content/uploads.ts'
        purpose: Private upload storage + indexing.
      - type: http
        id: 'POST /api/student/uploads'
      - type: http
        id: 'GET /api/student/uploads'
      - type: http
        id: 'DELETE /api/student/uploads/:id'
    decision_rules:
      - Uploads are user-private. They NEVER enter cohort telemetry.
      - LLM or Wolfram calls against an upload require explicit
        per-request user consent.
      - Uploads are deleted on account-close (chained from
        data-rights-specialist).
      - The upload index (concept_id mappings) is private per-user too.

  # ═══ Under acquisition-manager (CCO side) — community content ═════

  - id: community-content-specialist
    reports_to: acquisition-manager
    mission: Manage the link between this code repo and the separate
      project-vidhya-content community repo. Pull pinned content,
      register it with content-router, and operate user subscriptions.
    skills:
      - Read content.pin and sync the pinned SHA of the content repo.
      - Build a manifest of available community bundles.
      - Maintain .data/content-subscriptions.json.
      - Expose community bundles to content-router via peer query.
    owned_tools:
      - type: module
        id: 'src/content/community.ts'
        purpose: Content-repo sync + user subscriptions.
      - type: http
        id: 'GET /api/student/content/subscriptions'
      - type: http
        id: 'POST /api/student/content/subscribe'
    decision_rules:
      - Pinned SHA governs which content version a deployment uses.
      - Content from unverified bundles is gated through
        verification-manager before routing.
      - User subscriptions are additive — subscribing to a bundle
        preferences it; un-subscribing returns to the default.
      - Stub mode (empty manifest) is valid when the content repo
        doesn't exist yet.

# ─── Portability ──────────────────────────────────────────────────────
#
# Every specialist in this file:
#   - reports to exactly one manager
#   - has a one-sentence mission
#   - lists the tools it may call
#   - is optionally connected to specific peers
#
# An orchestrator that loads this file constructs a node per specialist.
# Peer connections are edges in the agent graph. The orchestrator
# enforces least-privilege via owned_tools.

portability:
  tested_runtimes:
    - claude-agent-sdk
    - mcp-stdio
  minimum_context_window: 4000
  decision_rule: >
    Specialists run in the cheapest usable model by default — they
    execute narrow tasks with known inputs. A manager may upgrade the
    model per-call when the task requires larger reasoning.
