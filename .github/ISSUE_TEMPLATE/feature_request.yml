name: ✨ Feature Request
description: Propose a new capability or enhancement
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check:
        - [FEATURES.md](../FEATURES.md) — existing moats, what's shipped
        - [TODOS.md](../TODOS.md) — already-planned work
        - Open issues — avoid duplicates

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content sources (new scraper)
        - Concept graph (new nodes / topics)
        - Content pipeline (generation, verification)
        - Resolver (new tier, better routing)
        - GBrain cognitive model
        - Frontend (UX, visualizations)
        - Admin / observability
        - Infrastructure (deploy, CI)
        - Documentation
        - New subject domain (JEE, CAT, UPSC, etc.)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem being solved
      description: What's the student or operator pain point?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you approach it? File paths if you've scoped it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you rejected, and why

  - type: dropdown
    id: moat
    attributes:
      label: Which moat does this strengthen?
      description: See FEATURES.md Appendix B for the moat list
      options:
        - Cost
        - Privacy
        - Quality
        - Personalization
        - Content
        - Cognitive model
        - Observability
        - Operational (graceful degradation)
        - Licensing
        - Domain-agnostic architecture
        - Not a moat — tactical improvement
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Rough effort estimate
      options:
        - Tiny (< 1 day)
        - Small (1–3 days)
        - Medium (1 week)
        - Large (2+ weeks)
        - Not sure

  - type: checkboxes
    id: contribute
    attributes:
      label: Willing to contribute?
      options:
        - label: I'd like to implement this myself (with guidance if needed)
        - label: I can help test / review but not implement
        - label: I'm just requesting
