# Netlify Configuration for EduGenius Frontend
# Place this file in the frontend/ directory (or repo root if deploying from there)

[build]
  # Build command
  command = "npm run build"
  # Output directory
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA Routing ────────────────────────────────────────────────────────────────
# React Router needs all routes to serve index.html (otherwise 404 on refresh)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively (they have content hashes in filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache index.html (so new deploys are picked up immediately)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

