name: Content Engine Pipeline

# Nightly scrape + explainer top-up + Wolfram verification + bundle rebuild.
# Runs headless on GitHub Actions. Commits the refreshed bundle back to main
# which triggers Render auto-deploy.
#
# To enable: add WOLFRAM_APP_ID and GEMINI_API_KEY to repo secrets.
# Manual runs: Actions → Content Engine Pipeline → Run workflow.

on:
  schedule:
    # 03:30 UTC = 09:00 IST — after the GBrain cron jobs finish
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to run'
        required: true
        type: choice
        default: all
        options:
          - scrape-only
          - explainers-only
          - bundle-only
          - wolfram-only
          - all
      limit:
        description: 'Problem limit for Wolfram verification'
        required: false
        type: string
        default: '30'

permissions:
  contents: write  # needed to commit refreshed bundle

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  WOLFRAM_APP_ID: ${{ secrets.WOLFRAM_APP_ID }}

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Scrape curated corpus
        if: ${{ github.event.inputs.stage == 'scrape-only' || github.event.inputs.stage == 'all' || github.event.inputs.stage == '' }}
        run: |
          npx tsx scripts/scrape-corpus.ts --source gate
          npx tsx scripts/scrape-textbooks.ts --source openstax
          npx tsx scripts/scrape-textbooks.ts --source ocw

      - name: Build explainer library (resume-safe, limit 10/night)
        if: ${{ github.event.inputs.stage == 'explainers-only' || github.event.inputs.stage == 'all' || github.event.inputs.stage == '' }}
        continue-on-error: true  # placeholder fallback when Gemini key absent
        run: npx tsx scripts/build-explainers.ts --limit 10

      - name: Rebuild content bundle
        if: ${{ github.event.inputs.stage == 'bundle-only' || github.event.inputs.stage == 'all' || github.event.inputs.stage == '' }}
        run: npx tsx scripts/build-bundle.ts

      - name: Wolfram batch verification
        if: ${{ github.event.inputs.stage == 'wolfram-only' || github.event.inputs.stage == 'all' || github.event.inputs.stage == '' }}
        continue-on-error: true  # don't fail the run if Wolfram is down or key missing
        run: |
          if [ -n "$WOLFRAM_APP_ID" ]; then
            npx tsx scripts/verify-wolfram-batch.ts --limit ${{ github.event.inputs.limit || '30' }}
          else
            echo "WOLFRAM_APP_ID not set — skipping verification"
          fi

      - name: Report bundle stats
        run: |
          if [ -f frontend/public/data/content-bundle.json ]; then
            echo "=== Bundle stats ==="
            node -e "
              const b = JSON.parse(require('fs').readFileSync('frontend/public/data/content-bundle.json','utf8'));
              console.log(JSON.stringify(b.stats, null, 2));
            "
            echo ""
            echo "Bundle size:"
            ls -lh frontend/public/data/content-bundle.json
          fi

      - name: Commit updated bundle
        run: |
          git config user.name "gbrain-content-bot"
          git config user.email "content-bot@users.noreply.github.com"

          if git diff --quiet frontend/public/data/ data/raw/ 2>/dev/null; then
            echo "No content changes this run."
            exit 0
          fi

          git add frontend/public/data/ data/raw/ data/wolfram-verify-report.json 2>/dev/null || true
          TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('frontend/public/data/content-bundle.json','utf8')).stats.total_problems)")
          EXPLAINERS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('frontend/public/data/content-bundle.json','utf8')).stats.total_explainers)")
          VERIFIED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('frontend/public/data/content-bundle.json','utf8')).stats.wolfram_verified || 0)")

          git commit -m "content: automated refresh ($TOTAL problems, $EXPLAINERS explainers, $VERIFIED wolfram-verified)

          Auto-generated by content-engine workflow at $(date -u +%Y-%m-%dT%H:%M:%SZ).
          Ran: scrape + explainers + bundle + wolfram verify."
          git push
