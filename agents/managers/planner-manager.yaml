id: planner-manager
tier: manager
reports_to: cpo

mission: >
  Deliver session plans that turn whatever time the student has —
  three minutes or sixty — into meaningful progress against their
  registered exams.

skills:
  - Combine exam proximity, student mastery, and time budget into an
    ordered action list.
  - Select between single-exam and multi-exam planner modes based on
    the student's profile.
  - "Hold the exam-proximity-aware invariant: advice on day 180 and day 3 must differ."

owned_tools:
  - type: mcp
    id: 'student:plan-session'
    purpose: Generate a fresh session plan.
  - type: http
    id: 'POST /api/student/session/plan'
    purpose: Single-exam HTTP entry point.
  - type: http
    id: 'POST /api/student/session/plan/multi-exam'
    purpose: Multi-exam HTTP entry point.
  - type: module
    id: 'src/session-planner#planSession'
    purpose: Pure planner function.

connections:
  upstream:
    - id: cpo
      channel: delegation
  downstream:
    - id: session-executor
      channel: delegation     # Specialist that walks a plan with the student
    - id: template-curator
      channel: delegation     # Specialist that manages saved templates + presets
  peers:
    - id: teaching-manager
      channel: query          # content availability per concept
    - id: student-model-manager
      channel: query          # mastery + attention state

decision_rules:
  - If the student has ≥2 exams registered, route to multi-exam planner.
  - If the exam is ≤ 7 days away, weight revision heavily over new concepts.
  - Never return a plan that exceeds the caller's minutes_available budget.

emits_signals:
  - name: plan-generated
    schema: '{ plan_id, student_id, exam_id, minutes }'
    when: A new plan is saved.
  - name: plan-executed
    schema: '{ plan_id, actual_minutes, actions_completed }'
    when: A plan completes with recorded outcomes.

subscribes_to:
  - name: concept-mastery-changed
    from: cdo
    action: Invalidate cached priority weightings for that student.

portability:
  tested_runtimes: [claude-agent-sdk, mcp-stdio]
  minimum_context_window: 8000

quality_gates:
  - Every plan names its exam_id (multi-exam plans tag each action).
  - Total plan minutes must fit within caller's budget.
