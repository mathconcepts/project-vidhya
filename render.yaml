# render.yaml — Render Blueprint for the Vidhya demo
#
# Deploy via either:
#
#   1. One-click — use the "Deploy to Render" button in README.md, which
#      opens https://dashboard.render.com/select-repo?type=blueprint
#      pre-pointed at this repo. Render reads this file and provisions
#      everything.
#
#   2. Manual — in Render dashboard: New + > Blueprint > connect this
#      repo > apply. Same result.
#
# What gets provisioned:
#   - 1 web service (Docker runtime, uses demo/Dockerfile)
#   - 1 persistent disk, 1 GB, mounted at /app/.data
#     → keeps demo seed data, demo-usage log, user store across restarts
#   - JWT_SECRET auto-generated (32 chars, unique per deployment)
#   - All LLM / Wolfram / Telegram keys marked sync:false so the Render
#     UI prompts the operator to paste them (or skip — the demo works
#     without any of them at baseline)
#
# First boot runs: npm run demo:seed && tsx src/gate-server.ts
#   → on fresh deploys this seeds the 6 demo users; on restarts with an
#     existing disk, seed is idempotent (upsert-by-google-sub; existing
#     users are updated rather than duplicated).

services:
  - type: web
    name: vidhya-demo
    runtime: docker
    plan: free                       # upgrade to 'starter' if demo traffic warrants it
    dockerfilePath: ./demo/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: vidhya-demo-data
      mountPath: /app/.data
      sizeGB: 1
    envVars:
      # ─── required ───────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true          # Render picks a random 32-char secret on first deploy
      - key: PUBLIC_URL
        sync: false                  # operator sets this to their Render URL after first deploy

      # ─── BYOK LLM providers (one enables AI tutor / Snap / explainers) ─
      # Each is optional. Demo works with NONE at baseline (planning,
      # templates, trailing stats, admin dashboards).
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VIDHYA_LLM_PRIMARY_PROVIDER
        sync: false                  # "gemini" / "anthropic" / "openai"

      # ─── optional: Wolfram (maths verification) ─────────────────
      - key: WOLFRAM_APP_ID
        sync: false

      # ─── optional: channel delivery ─────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
