id: feedback-manager
tier: manager
reports_to: cpo

mission: >
  Close the loop from student feedback back to the teaching surface —
  collect, triage, cluster, and route feedback to the right CCO lane.

skills:
  - Triage raw student feedback into actionable clusters.
  - Route to Authoring Manager (rewrite), Verification Manager
    (re-verify), or product (UX fix).
  - Approve or apply feedback once action is taken.

owned_tools:
  - type: mcp
    id: 'feedback:list-pending-triage'
    purpose: See raw feedback needing triage.
  - type: mcp
    id: 'feedback:triage'
    purpose: Cluster + route.
  - type: mcp
    id: 'feedback:list-by-exam'
    purpose: Exam-filtered view.
  - type: mcp
    id: 'feedback:approve'
    purpose: Approve an action plan.
  - type: mcp
    id: 'feedback:apply'
    purpose: Apply the approved action.
  # --- GBrain read dependency (triage uses error categories) ---
  - type: module
    id: 'src/gbrain/error-taxonomy'
    purpose: Read-only. When clustering feedback, tag each cluster
      with the likely error category. Routing decisions depend on
      this — category-3 errors route to authoring for rewrite;
      category-5 errors route to verification for re-check.

connections:
  upstream: [{ id: cpo, channel: delegation }]
  downstream: []
  peers:
    - id: authoring-manager
      channel: delegation     # cross-functional to CCO
    - id: verification-manager
      channel: delegation
    - id: teaching-manager
      channel: query
    - id: student-model-manager
      channel: query          # ask cohort mastery state when triaging —
                              # a concept with high cohort error rate
                              # gets prioritised in the queue

decision_rules:
  - Feedback older than 14 days without triage escalates to CPO.

emits_signals:
  - name: feedback-triage-complete
    schema: '{ cluster_id, concept_id, action_kind }'
    when: Triage reaches a routable decision.

subscribes_to:
  - name: teaching-answer-delivered
    from: teaching-manager
    action: If the answer is flagged in post-response feedback, enqueue.

portability: { tested_runtimes: [claude-agent-sdk, mcp-stdio], minimum_context_window: 16000 }
quality_gates:
  - Every piece of feedback resolves within 14 days.
