name: 🐛 Bug Report
description: Report a defect in Vidhya's behavior
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report.

        **Security issues don't belong here** — see [SECURITY.md](../SECURITY.md)
        for private disclosure.

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      description: Find in package.json, VERSION, or `git log --oneline -1`
      placeholder: "v2.2.3 or 17eb164"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Content resolver (tier cascade)
        - Wolfram verification
        - Content pipeline (scrapers, builders)
        - GBrain cognitive model
        - Frontend (SmartPractice, Chat, Materials, Admin)
        - Stateless API (Gemini proxy, aggregate)
        - Installation / build
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug
      placeholder: "I called /api/content/resolve with X and expected Y, but got Z"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps, ideally a curl or test case
      placeholder: |
        1. Start server with JWT_SECRET=test
        2. curl -X POST http://localhost:8080/api/content/resolve -d '...'
        3. Observe response
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Full error output, stack trace, or JSON response
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version, browser if relevant"
      placeholder: "macOS 14.4 / Node 20.11.0 / Chrome 120"
    validations:
      required: true

  - type: checkboxes
    id: verify
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I'm on a supported version (2.2.x or 2.1.x)
          required: true
        - label: This isn't a security issue (those go via SECURITY.md)
          required: true
