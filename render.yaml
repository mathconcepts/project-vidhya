# render.yaml -- Render Blueprint for the Vidhya demo
#
# Deploy via either:
#
#   1. One-click -- use the "Deploy to Render" button in README.md, which
#      opens https://dashboard.render.com/select-repo?type=blueprint
#      pre-pointed at this repo. Render reads this file and provisions
#      everything.
#
#   2. Manual -- in Render dashboard: New > Blueprint > connect this
#      repo > apply. Same result.
#
# What gets provisioned:
#   - 1 web service (Docker runtime, uses demo/Dockerfile)
#   - JWT_SECRET auto-generated (32 chars, unique per deployment)
#   - All LLM / Wolfram / Telegram keys marked sync:false so the Render
#     UI prompts the operator to paste them (or skip -- the demo works
#     without any of them at baseline)
#
# PERSISTENCE NOTE (free tier):
#   Render's free tier does not support persistent disks. This means
#   .data/ (user store, analytics, teaching turns) lives in the
#   container's ephemeral filesystem and resets when the service restarts
#   or spins down after inactivity. The Dockerfile CMD runs
#   "npm run demo:seed" on every boot, so the 6 demo users are always
#   recreated fresh.
#
#   For a demo this is fine -- each restart gives a clean slate.
#   For persistent state (user data survives restarts, real signups
#   accumulate over time), upgrade to the Starter plan ($7/month)
#   and add this block back under the service:
#
#     disk:
#       name: vidhya-demo-data
#       mountPath: /app/.data
#       sizeGB: 1
#
# First boot: npm run demo:seed && tsx src/gate-server.ts
#   Seeds 6 demo users (Nisha/Arjun/Kavita/Priya/Rahul/Aditya).
#   Seed is idempotent (upsert-by-google-sub) so re-running is safe.

services:
  - type: web
    name: vidhya-demo
    runtime: docker
    plan: free
    dockerfilePath: ./demo/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # required
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false

      # ── AI tutor (STEP 1: paste one key to unlock AI chat) ──────────────
      # Get a free Gemini key at https://aistudio.google.com/apikey
      # Without any key: demo, plans, and exam content all work; only AI chat is disabled.
      - key: GEMINI_API_KEY
        sync: false
      # Alternatives to Gemini (pick any one; Gemini recommended for free tier):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Override which provider is primary (default: auto-detect from key present):
      - key: VIDHYA_LLM_PRIMARY_PROVIDER
        sync: false

      # ── Maths verification (STEP 2: optional, improves answer accuracy) ─
      # Free key at https://products.wolframalpha.com/api
      - key: WOLFRAM_APP_ID
        sync: false

      # ── Analytics (optional: see how students use the app) ───────────────
      # Free PostHog account at https://posthog.com — paste your host URL here
      - key: POSTHOG_HOST
        sync: false

      # ── Channel delivery (optional: Telegram / WhatsApp bots) ────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

      # ── GATE Math specific (optional) ────────────────────────────────────
      # Which exam to serve (default: gate-ma). Other values: jee-main, neet, etc.
      - key: DEFAULT_EXAM_ID
        sync: false
      # Supabase database (optional: enables GBrain student model persistence)
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
