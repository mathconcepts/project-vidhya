id: student-model-manager
tier: manager
reports_to: cdo

mission: >
  Own the GBrain Bayesian knowledge model — 15 student attributes,
  7 error categories, the attention store, the practice session log,
  and the concept mastery graph per student.

skills:
  - Update the student model from each logged attempt.
  - Surface trailing-window attention state.
  - Compute per-concept mastery and emit signals on threshold crossings.

owned_tools:
  - type: mcp
    id: 'attention:coverage-for-user'
    purpose: Read per-student trailing window.
  - type: mcp
    id: 'attention:get-overdue-deferrals'
    purpose: Find deferrals needing promotion.
  - type: module
    id: 'src/attention/store#recordSession'
    purpose: Unified practice log + attention writer.
  - type: module
    id: 'src/session-planner/practice-session-log'
    purpose: Timestamped session log.
  - type: module
    id: 'src/gbrain#*'
    purpose: The cognitive model proper.

connections:
  upstream: [{ id: cdo, channel: delegation }]
  downstream:
    - id: mastery-estimator
      channel: delegation
    - id: error-classifier
      channel: delegation
  peers:
    - id: planner-manager
      channel: query          # planner needs mastery
    - id: teaching-manager
      channel: query          # teaching needs weakness signals
    - id: assessment-manager
      channel: signal         # receives attempt-recorded

decision_rules:
  - Prefer on-device updates; only aggregate anonymised deltas to the
    opt-in cohort store.
  - Model updates are idempotent — replaying the same event stream
    produces the same model.

emits_signals:
  - name: concept-mastery-changed
    schema: '{ student_id, concept_id, old_mastery, new_mastery }'
    when: A threshold is crossed.
  - name: student-inactive-7-days
    schema: '{ student_id, last_session_at }'
    when: Hourly sweep.

subscribes_to:
  - name: attempt-recorded
    from: assessment-manager
    action: Update the student model.

portability:
  tested_runtimes: [claude-agent-sdk, mcp-stdio]
  minimum_context_window: 8000
quality_gates:
  - Model updates are deterministic given the event stream.
  - No PII leaves the device.
