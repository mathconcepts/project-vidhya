id: seo-manager
tier: manager
reports_to: cmo

mission: >
  Maintain public articles that help students find Vidhya — keep them
  accurate against the shipped product, retire the stale ones.

skills:
  - Detect article drift.
  - Refresh or retire articles.

owned_tools:
  - type: mcp
    id: 'marketing:list-articles-for-exam'
    purpose: See public articles per exam.
  - type: mcp
    id: 'marketing:list-stale-articles'
    purpose: Find stale articles.
  - type: mcp
    id: 'marketing:detect-drift'
    purpose: Detect claim-vs-product drift.

connections:
  upstream: [{ id: cmo, channel: delegation }]
  downstream: []
  peers:
    - id: outreach-manager
      channel: query
    - id: curriculum-manager
      channel: query          # cross-functional — verify curriculum claims

decision_rules:
  - Stale > 90 days without refresh triggers retirement.

emits_signals:
  - name: article-refreshed
    schema: '{ article_id, version }'
    when: Refresh completes.

subscribes_to:
  - name: student-surface-changed
    from: cpo
    action: Check affected articles; trigger refresh.

portability: { tested_runtimes: [claude-agent-sdk, mcp-stdio], minimum_context_window: 8000 }
quality_gates:
  - No article older than 90 days without refresh or retirement.
